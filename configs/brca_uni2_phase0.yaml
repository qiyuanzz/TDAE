# BRCA survival first-pass config for UNI2 + deterministic Phase 0 allocation.
wsi_root: "/mnt/Archive/Dataset/GDC_DATA/GDC_DATA"
feature_bank_root: "/mnt/Xsky/zqb/TCGA_WSI_feature_bank"
patch_root: "/mnt/Xsky/zqb/TCGA_WSI_feature_bank/BRCA/preprocess"
feature_dir: "/mnt/Xsky/zqb/TCGA_WSI_feature_bank/BRCA/features"
result_dir: "/mnt/Xsky/zqb/TDAE/outputs"
