# Data
wsi_root: "/mnt/Archive/Dataset/GDC_DATA/GDC_DATA"
feature_bank_root: "/mnt/Xsky/zqb/TCGA_WSI_feature_bank"
patch_root: "/mnt/Xsky/zqb/TCGA_WSI_feature_bank/GBMLGG/preprocess"
feature_dir: "/mnt/Xsky/zqb/TCGA_WSI_feature_bank/GBMLGG/features"
result_dir: "/mnt/Xsky/zqb/TDAE/outputs"
cohort_csv: "/mnt/Xsky/zqb/TDAE/data/csvs/TCGA_GBMLGG_survival_dx.csv"
split_dir: "/mnt/Xsky/zqb/TDAE/data/splits"
patch_size: 224
magnification: 20.0
target_mpp: 0.5

# Task
task: "survival"
label_column: null

# Encoder
encoder_name: "uni2h"
truncate_layer: 3
medium_layer: 12
trident_python: "/opt/conda/envs/trident/bin/python"

# Model
aggregator: "abmil"
gating_hidden: 256
pos_encoding_dim: 64
d_gat_hidden: 256
gat_heads: 4
gat_layers: 2
k_neighbors: 8
use_pyg_gat: null  # null=auto: use torch-geometric when installed, otherwise use built-in fallback

# Training
warmup_epochs: 5
joint_epochs: 20
task_epochs: 20
bag_loss: "nll_surv"
alpha_surv: 0.0
n_classes: 4
lr_gating: 5e-4
lr_task: 2e-4
lr_aggregator: 2e-4
weight_decay: 1e-5
survival_batch_size: 32
early_stopping: false
model_selection: "last_epoch"

# Gumbel-Softmax
tau_start: 1.0
tau_end: 0.1

# FLOPs budget for 4-level gating
flops_cost: [0.125, 0.125, 0.5, 1.0]
c_start: 0.6
c_end: 0.3
lambda_budget: 1.0
mu_diversity: 0.1

# Evaluation
eval_every: 1
n_splits: 5
seed: 1
